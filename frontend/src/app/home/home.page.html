<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Blank
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Blank</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container">
    <!-- Componente UI principal con bindings básicos e interpolación -->
    <ion-button 
      class="cta-button" 
      [color]="affiliationState === 'pending' ? 'medium' : 'primary'"
      (click)="toggleAffiliation()">
      {{ affiliationState === 'pending' ? 'Cancelar' : 'Afiliate' }}
    </ion-button>

    <!-- Renderizado condicional primitivo simulando un estado pendiente -->
    <ion-button 
      *ngIf="affiliationState === 'pending'"
      class="referral-button"
      color="secondary">
      Invitar amigos
    </ion-button>
  </div>
</ion-content>
